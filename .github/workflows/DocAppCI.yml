name: My DocApp CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: CheckOut Code clone the repo and download code
        uses: actions/checkout@v4

      - name: Setup Node - install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm install

      - name: Build frontend dist folder
        run: |
          cd Frontend
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm install
      
